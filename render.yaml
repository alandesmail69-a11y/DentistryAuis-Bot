services:
  - type: web
    name: dentistry-telegram-bot
    runtime: python
    buildCommand: pip install -r telegram-bot/requirements.txt
    startCommand: cd telegram-bot && python main.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
    autoDeploy: false
